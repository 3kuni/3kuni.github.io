<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obsidian Redirect</title>
<style>
  body {
    margin: 0;
    padding: 40px 20px;
    background-color: #F7F5F2;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    color: #3D3D3D;
    text-align: center;
  }
  .card {
    max-width: 400px;
    margin: 0 auto;
    background: #FFFFFF;
    border-radius: 12px;
    padding: 32px;
  }
  .title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .message {
    font-size: 14px;
    color: #8C8278;
    line-height: 1.6;
  }
  a {
    color: #6B9BD2;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="title">Obsidianで開いています...</div>
  <p class="message" id="status">リダイレクト中です。</p>
  <p class="message" id="fallback" style="display:none;">
    自動で開かない場合は<br>
    <a id="direct-link" href="#">こちらをクリック</a>
  </p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const vault = params.get('vault');
  const file = params.get('file');

  if (vault && file) {
    const uri = 'obsidian://open?vault=' + encodeURIComponent(vault) + '&file=' + encodeURIComponent(file);
    document.getElementById('direct-link').href = uri;

    // リダイレクト
    window.location.href = uri;

    // 1秒後にフォールバック表示
    setTimeout(function() {
      document.getElementById('status').style.display = 'none';
      document.getElementById('fallback').style.display = 'block';
    }, 1000);
  } else {
    document.getElementById('status').textContent = 'パラメータが不足しています。';
  }
</script>
</body>
</html>
